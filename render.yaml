services:
  - type: web
    name: lead-research-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class=gevent -w 1 --timeout 300 app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
